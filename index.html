<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envíos FLEX - Mikra + Chaya</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Envíos Flex">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            padding: 8px;
            padding-bottom: env(safe-area-inset-bottom, 12px);
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            color: #FFE600;
            margin-bottom: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .version-badge {
            display: inline-block;
            background: linear-gradient(135deg, #3483FA, #2563eb);
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            margin-left: 8px;
            vertical-align: middle;
            letter-spacing: 0.5px;
        }

        .info-badges {
            display: flex;
            gap: 6px;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .info-badge {
            background: #161b22;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            border: 1.5px solid #30363d;
            backdrop-filter: blur(8px);
        }

        .info-badge.fecha {
            background: linear-gradient(135deg, #FF6B00, #e85d04);
            border-color: transparent;
        }

        .info-badge.caba {
            background: linear-gradient(135deg, #9C27B0, #7b1fa2);
            border-color: transparent;
        }

        .info-badge.provincia {
            background: linear-gradient(135deg, #00897B, #00695c);
            border-color: transparent;
        }

        .top-buttons {
            text-align: center;
            margin-bottom: 20px;
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .tools-panel {
            display: none;
            animation: slideDown 0.25s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tools-panel.open {
            display: block;
        }

        button {
            background: linear-gradient(135deg, #3483FA, #2563eb);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            font-weight: 500;
            transition: all 0.2s ease;
            touch-action: manipulation;
            min-height: 44px;
        }

        button:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0) scale(0.98);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        button.btn-warning {
            background: linear-gradient(135deg, #FF9800, #e68900);
        }

        .filter-section {
            background: #161b22;
            padding: 14px;
            border-radius: 16px;
            margin-bottom: 12px;
            border: 1px solid #21262d;
        }

        .filter-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-row label {
            color: #FFE600;
            font-weight: 700;
            font-size: 13px;
        }

        .search-select-wrapper {
            flex: 1;
            min-width: 200px;
            position: relative;
        }

        .search-input-select {
            width: 100%;
            padding: 12px 40px 12px 15px;
            background: #0d1117;
            border: 1.5px solid #30363d;
            border-radius: 10px;
            color: #e6edf3;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 44px;
        }

        .search-input-select:focus {
            outline: none;
            border-color: #FFE600;
            box-shadow: 0 0 0 3px rgba(255, 230, 0, 0.15);
        }

        .dropdown-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #484f58;
            pointer-events: none;
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #161b22;
            border: 1.5px solid #FFE600;
            border-radius: 12px;
            margin-top: 5px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
        }

        .dropdown-menu.active {
            display: block;
            animation: fadeIn 0.15s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dropdown-search {
            position: sticky;
            top: 0;
            background: #161b22;
            padding: 10px;
            border-bottom: 1px solid #21262d;
        }

        .dropdown-search input {
            width: 100%;
            padding: 10px;
            background: #0d1117;
            border: 1.5px solid #30363d;
            border-radius: 8px;
            color: #e6edf3;
            font-size: 14px;
            font-family: inherit;
            min-height: 44px;
        }

        .dropdown-item {
            padding: 12px 15px;
            cursor: pointer;
            transition: all 0.15s;
            border-bottom: 1px solid #21262d;
            font-size: 14px;
        }

        .dropdown-item:hover, .dropdown-item:active {
            background: #21262d;
        }

        .dropdown-item.selected {
            background: #3483FA;
        }

        .stats-bar {
            background: #161b22;
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 12px;
            border: 1px solid #21262d;
            overflow: visible;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-bottom: 12px;
        }

        .stat-item {
            text-align: center;
            cursor: pointer;
            padding: 8px 4px;
            border-radius: 12px;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            min-height: 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .stat-item:hover {
            background: #21262d;
        }

        .stat-item:active {
            transform: scale(0.95);
        }

        .stat-item.active {
            background: linear-gradient(135deg, #3483FA, #2563eb);
            border-color: rgba(52, 131, 250, 0.4);
            box-shadow: 0 4px 12px rgba(52, 131, 250, 0.2);
        }

        /* Filtro rápido por cuenta */
        .cuenta-filter {
            display: flex;
            gap: 6px;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .cuenta-btn {
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 12px;
            font-weight: 700;
            font-family: inherit;
            background: #21262d;
            border: 2px solid transparent;
            color: #8b949e;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 40px;
            touch-action: manipulation;
        }

        .cuenta-btn:hover { filter: brightness(1.1); }
        .cuenta-btn:active { transform: scale(0.95); }

        .cuenta-btn.all.active {
            border-color: #FFE600;
            background: linear-gradient(135deg, #3483FA, #2563eb);
            color: white;
        }

        .cuenta-btn.mikra-btn.active {
            background: linear-gradient(135deg, #9C27B0, #7b1fa2);
            border-color: #ce93d8;
            color: white;
        }

        .cuenta-btn.chaya-btn.active {
            background: linear-gradient(135deg, #FF6B00, #e85d04);
            border-color: #ffab40;
            color: white;
        }

        .cuenta-separator {
            color: #30363d;
            font-size: 20px;
            user-select: none;
        }

        .cuenta-btn.canceladas-toggle {
            background: #1c1215;
            border: 2px solid #3d1a1a;
            color: #f85149;
        }

        .cuenta-btn.canceladas-toggle:hover {
            border-color: #f85149;
        }

        .cuenta-btn.canceladas-toggle.active {
            background: #f85149;
            border-color: #ff7b72;
            color: white;
            box-shadow: 0 4px 12px rgba(248, 81, 73, 0.3);
        }

        .cuenta-btn.canceladas-toggle span {
            background: #f85149;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            margin-left: 4px;
        }

        .cuenta-btn.canceladas-toggle.active span {
            background: rgba(255,255,255,0.25);
        }

        .cuenta-count {
            background: rgba(255,255,255,0.15);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            margin-left: 4px;
        }

        .stat-number {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 3px;
            letter-spacing: -0.5px;
        }

        .stat-label {
            font-size: 10px;
            color: #8b949e;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .progress-bar-container {
            background: #0d1117;
            border-radius: 20px;
            height: 28px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            display: flex;
            position: relative;
        }

        .progress-segment {
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
        }

        .progress-segment:active {
            opacity: 0.7;
        }

        .progress-segment.pendiente { background: linear-gradient(90deg, #9C27B0, #8e24aa); }
        .progress-segment.en-camino { background: linear-gradient(90deg, #00d9ff, #00b8d4); color: #000; }
        .progress-segment.entregado { background: linear-gradient(90deg, #00ff88, #00e676); color: #000; }
        .progress-segment.cancelado { background: linear-gradient(90deg, #f85149, #da3633); }
        .progress-segment.reprogramado { background: linear-gradient(90deg, #FF9800, #f57c00); color: #000; }

        .sort-controls {
            background: #0d1117;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            gap: 6px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            border: 1px solid #21262d;
        }

        .sort-btn {
            padding: 8px 14px;
            font-size: 12px;
            font-family: inherit;
            background: #21262d;
            border-radius: 10px;
            min-height: 38px;
        }

        .sort-btn.active {
            background: #FFE600;
            color: #000;
            font-weight: 700;
        }

        .envio-card {
            background: #161b22;
            border-left: 4px solid;
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 10px;
            transition: all 0.2s ease;
            border: 1px solid #21262d;
            border-left-width: 4px;
        }

        .envio-card:hover {
            background: #1c2128;
        }

        .envio-card.pendiente { border-left-color: #9C27B0; }
        .envio-card.en-camino { border-left-color: #00d9ff; }
        .envio-card.entregado { border-left-color: #00ff88; }
        .envio-card.cancelado { border-left-color: #f85149; opacity: 0.7; }
        .envio-card.reprogramado { border-left-color: #FF9800; }

        .envio-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .estado-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.3px;
        }

        .estado-badge.pendiente { background: linear-gradient(135deg, #9C27B0, #7b1fa2); }
        .estado-badge.en-camino { background: linear-gradient(135deg, #00d9ff, #00b8d4); color: #000; }
        .estado-badge.entregado { background: linear-gradient(135deg, #00ff88, #00e676); color: #000; }
        .estado-badge.cancelado { background: linear-gradient(135deg, #f85149, #da3633); }
        .estado-badge.reprogramado { background: linear-gradient(135deg, #FF9800, #f57c00); color: #000; }

        .envio-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 8px;
            margin-top: 10px;
        }

        .info-item {
            background: #0d1117;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #21262d;
        }

        .info-label {
            color: #8b949e;
            font-size: 10px;
            margin-bottom: 4px;
            text-transform: uppercase;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .info-value {
            color: #e6edf3;
            font-size: 13px;
            font-weight: 500;
        }

        .zona-highlight {
            font-size: 14px;
            font-weight: 700;
            color: #FFE600;
        }

        .direccion-link, .order-link {
            color: #58a6ff;
            text-decoration: none;
            transition: all 0.2s;
        }

        .direccion-link:hover, .order-link:hover {
            color: #FFE600;
        }

        .timeline {
            background: #0d1117;
            padding: 12px;
            border-radius: 10px;
            margin-top: 10px;
            border: 1px solid #21262d;
        }

        .timeline-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            position: relative;
        }

        .timeline-item:not(:last-child)::after {
            content: '';
            position: absolute;
            left: 7px;
            top: 25px;
            width: 2px;
            height: calc(100% - 8px);
            background: #21262d;
        }

        .timeline-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
            z-index: 1;
            transition: all 0.3s;
        }

        .timeline-dot.done {
            background: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.4);
        }

        .timeline-dot.pending {
            background: #21262d;
            border: 2px solid #30363d;
        }

        .timeline-content {
            flex: 1;
        }

        .timeline-label {
            color: #8b949e;
            font-size: 12px;
        }

        .timeline-time {
            color: #00ff88;
            font-weight: 700;
            font-size: 13px;
        }

        .timeline-time.pending {
            color: #484f58;
        }

        /* TRACKING DETALLADO */
        .tracking-detail {
            background: #0d1117;
            border-radius: 10px;
            padding: 10px;
            margin-top: 8px;
            border-left: 3px solid #58a6ff;
            border: 1px solid #21262d;
            border-left: 3px solid #58a6ff;
        }

        .tracking-event {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 4px 0;
            font-size: 12px;
            color: #8b949e;
        }

        .tracking-event .track-icon {
            flex-shrink: 0;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 4px;
        }

        .tracking-event .track-icon.shipped { background: #00d9ff; box-shadow: 0 0 6px rgba(0,217,255,0.3); }
        .tracking-event .track-icon.near { background: #FFE600; box-shadow: 0 0 6px rgba(255,230,0,0.3); }
        .tracking-event .track-icon.absent { background: #f85149; box-shadow: 0 0 6px rgba(248,81,73,0.3); }
        .tracking-event .track-icon.retry { background: #FF9800; box-shadow: 0 0 6px rgba(255,152,0,0.3); }
        .tracking-event .track-icon.delivered { background: #00ff88; box-shadow: 0 0 6px rgba(0,255,136,0.3); }
        .tracking-event .track-icon.default { background: #484f58; }

        .tracking-event .track-time {
            color: #484f58;
            font-size: 11px;
            min-width: 40px;
        }

        .tracking-event .track-msg {
            flex: 1;
        }

        .tracking-event.highlight-absent {
            color: #f85149;
            font-weight: 700;
        }

        .tracking-event.highlight-near {
            color: #FFE600;
        }

        .driver-info {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #0d2137;
            color: #58a6ff;
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
        }

        .reputation-warning {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #f85149;
            color: white;
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
            animation: pulse-rep 2s infinite;
        }

        @keyframes pulse-rep {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .reputation-ok {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #0d2d15;
            color: #56d364;
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 11px;
        }

        .loading {
            text-align: center;
            padding: 50px 20px;
            font-size: 15px;
            color: #FFE600;
            font-weight: 500;
        }

        .loading-spinner {
            display: inline-block;
            width: 36px;
            height: 36px;
            border: 3px solid #21262d;
            border-top-color: #FFE600;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Barra de progreso de carga */
        .load-progress-wrap {
            margin: 16px auto 0;
            max-width: 320px;
        }
        .load-progress-track {
            background: #21262d;
            border-radius: 20px;
            height: 10px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .load-progress-fill {
            height: 100%;
            border-radius: 20px;
            background: linear-gradient(90deg, #FFE600, #ff9800);
            transition: width 0.15s ease-out;
            width: 0%;
        }
        .load-progress-text {
            font-size: 12px;
            color: #8b949e;
            font-weight: 400;
        }

        .error {
            background: linear-gradient(135deg, #f85149, #da3633);
            color: white;
            padding: 20px;
            border-radius: 14px;
            margin: 15px 0;
            text-align: center;
            font-weight: 500;
        }

        .hidden {
            display: none;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #484f58;
            font-size: 15px;
        }

        .fecha-hoy {
            color: #ff6b00;
            font-weight: 700;
        }

        .items-count {
            background: #FFE600;
            color: #000;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 700;
        }

        .cuenta-badge {
            color: white;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 700;
            margin-left: 6px;
        }

        .cuenta-badge.mikra {
            background: linear-gradient(135deg, #9C27B0, #7b1fa2);
        }

        .cuenta-badge.chaya {
            background: linear-gradient(135deg, #FF6B00, #e85d04);
        }

        /* VISTA SIMPLE */
        .envio-card-simple {
            background: #161b22;
            border-left: 4px solid;
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 8px;
            transition: all 0.2s ease;
            cursor: pointer;
            border: 1px solid #21262d;
            border-left-width: 4px;
        }

        .envio-card-simple:active {
            transform: scale(0.99);
            background: #1c2128;
        }

        .envio-card-simple.pendiente { border-left-color: #9C27B0; }
        .envio-card-simple.en-camino { border-left-color: #00d9ff; }
        .envio-card-simple.entregado { border-left-color: #00ff88; }
        .envio-card-simple.cancelado { border-left-color: #f85149; opacity: 0.7; }
        .envio-card-simple.reprogramado { border-left-color: #FF9800; }

        .simple-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .simple-zona {
            flex: 1;
            font-size: 15px;
            font-weight: 700;
            color: #FFE600;
            letter-spacing: -0.3px;
        }

        .simple-estado {
            padding: 5px 14px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 12px;
            white-space: nowrap;
        }

        .simple-estado.pendiente { background: linear-gradient(135deg, #9C27B0, #7b1fa2); }
        .simple-estado.en-camino { background: linear-gradient(135deg, #00d9ff, #00b8d4); color: #000; }
        .simple-estado.entregado { background: linear-gradient(135deg, #00ff88, #00e676); color: #000; }
        .simple-estado.cancelado { background: linear-gradient(135deg, #f85149, #da3633); }
        .simple-estado.reprogramado { background: linear-gradient(135deg, #FF9800, #f57c00); color: #000; }

        .simple-details {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #21262d;
            display: none;
            animation: expandIn 0.2s ease-out;
        }

        @keyframes expandIn {

            return texto.toLowerCase().trim()
                .replace(/á/g, 'a').replace(/é/g, 'e')

                .replace(/ú/g, 'u').replace(/ñ/g, 'n');

            const nombreNorm = normalizar(nombre);

            if (!zipCode) return false;

        // PUNTO 1: Calcular día anterior laborable (viernes si es domingo/lunes)
        function getDiaHabilActual() {
            const hoy = new Date();
            const diaSemana = hoy.getDay(); // 0=Dom, 6=Sáb
            
            // Si es sábado (6), cargar lunes (+2 días)
            if (diaSemana === 6) {
                hoy.setDate(hoy.getDate() + 2);
            }
            // Si es domingo (0), cargar lunes (+1 día)
            else if (diaSemana === 0) {
                hoy.setDate(hoy.getDate() + 1);
            }
            
            hoy.setHours(0, 0, 0, 0);
            return hoy;
        }

        function getDiaAnteriorLaborable() {
            const hoy = new Date();
            const diaSemana = hoy.getDay(); // 0=Dom, 1=Lun, ..., 6=Sáb
            
            let diasAtras = 1; // Por defecto ayer
            
            // Si hoy es domingo (0), retroceder al viernes (2 días)
            if (diaSemana === 0) {
                diasAtras = 2;
            }
            // Si hoy es lunes (1), retroceder al viernes (3 días)
            else if (diaSemana === 1) {
                diasAtras = 3;
            }
            // Si hoy es sábado (6), retroceder al viernes (1 día)
            else if (diaSemana === 6) {
                diasAtras = 1;
            }
            
            const diaAnterior = new Date();
            diaAnterior.setDate(diaAnterior.getDate() - diasAtras);
            diaAnterior.setHours(0, 0, 0, 0);
            
            return diaAnterior;
        }

        async function obtenerTokenCuenta(cuenta) {
            const cached = tokenCache[cuenta.nombre];
            if (cached && Date.now() < cached.expires) return cached.token;
            try {
                const response = await fetch(`${cuenta.proxy}/get-token`);
                const data = await response.json();
                if (data.access_token) {
                    tokenCache[cuenta.nombre] = { token: data.access_token, expires: Date.now() + 4 * 60 * 1000 };
                    // Cachear user_id en sessionStorage para evitar fetch doble en cargarOrdenesDeCuenta
                    if (data.user_id) {
                        sessionStorage.setItem(`${cuenta.nombre.toLowerCase()}_user_id`, data.user_id);
                    }
                    return data.access_token;
                }
                if (data.error === 'no_token') console.error(`Token no configurado para ${cuenta.nombre}`);
                return null;
            } catch (error) {
                console.error(`Error obteniendo token de ${cuenta.nombre}:`, error);
                return null;
            }
        }

        function formatearFecha(fechaISO) {
            if (!fechaISO) return '❌';
            
            const fecha = new Date(fechaISO);
            const hoy = new Date();
            
            hoy.setHours(0, 0, 0, 0);
            fecha.setHours(0, 0, 0, 0);
            
            const diffDias = Math.floor((fecha - hoy) / (1000 * 60 * 60 * 24));
            
            if (diffDias === 0) return 'Hoy';
            if (diffDias === -1) return 'Ayer';
            if (diffDias === 1) return 'Mañana';
            
            const dias = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
            const dia = dias[fecha.getDay()];
            const fechaFormato = fecha.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit' });
            
            return `${dia} ${fechaFormato}`;
        }

        function formatearSoloHora(fechaISO, fechaEsperada = null) {
            if (!fechaISO) return null;
            const fecha = new Date(fechaISO);
            
            // Si hay fecha esperada y no coincide, mostrar día también
            if (fechaEsperada) {
                const esperada = new Date(fechaEsperada);
                esperada.setHours(0, 0, 0, 0);
                const actual = new Date(fechaISO);
                actual.setHours(0, 0, 0, 0);
                
                if (esperada.getTime() !== actual.getTime()) {
                    const dias = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
                    const dia = dias[fecha.getDay()];
                    const hora = fecha.toLocaleString('es-AR', { 
                        timeZone: 'America/Argentina/Buenos_Aires',
                        hour: '2-digit',
                        minute: '2-digit',
                        hour12: false
                    });
                    return `${hora} (${dia})`;
                }
            }
            
            return fecha.toLocaleString('es-AR', { 
                timeZone: 'America/Argentina/Buenos_Aires',
                hour: '2-digit',
                minute: '2-digit',
                hour12: false
            });
        }

        function esEntregaParaFecha(shipping, targetDate) {
            const fechaEntrega = shipping.shipping_option?.estimated_delivery_time?.date || 
                                shipping.shipping_option?.estimated_delivery_final?.date;
            
            if (!fechaEntrega) return false;
            
            const entrega = new Date(fechaEntrega);
            entrega.setHours(0, 0, 0, 0);
            
            return entrega.getTime() === targetDate.getTime();
        }

        // ══════════════════════════════════════════════════════
        //  CACHE POR DÍA (sessionStorage)
        //  - Días pasados: 60 min TTL
        //  - Hoy: 5 min TTL (se refresca en background)
        // ══════════════════════════════════════════════════════
        const CACHE_PREFIX = 'flex_v1_';
        const CACHE_TTL_TODAY   = 5  * 60 * 1000;
        const CACHE_TTL_PAST    = 60 * 60 * 1000;

        function _cacheKey(date) {
            return CACHE_PREFIX + date.toISOString().split('T')[0];
        }

        function loadFromCache(date) {
            try {
                const raw = sessionStorage.getItem(_cacheKey(date));
                if (!raw) return null;
                const { ts, orders } = JSON.parse(raw);
                const hoy = new Date(); hoy.setHours(0,0,0,0);
                const isToday = date.toDateString() === hoy.toDateString();
                const ttl = isToday ? CACHE_TTL_TODAY : CACHE_TTL_PAST;
                if (Date.now() - ts > ttl) { sessionStorage.removeItem(_cacheKey(date)); return null; }
                return orders;
            } catch { return null; }
        }

        function saveToCache(date, orders) {
            try {
                // Guardar solo los campos necesarios para renderizar (no el objeto entero)
                sessionStorage.setItem(_cacheKey(date), JSON.stringify({ ts: Date.now(), orders }));
            } catch (e) {
                // sessionStorage lleno → limpiar caches viejos
                try {
                    const keys = Object.keys(sessionStorage).filter(k => k.startsWith(CACHE_PREFIX));
                    keys.slice(0, Math.ceil(keys.length / 2)).forEach(k => sessionStorage.removeItem(k));
                    sessionStorage.setItem(_cacheKey(date), JSON.stringify({ ts: Date.now(), orders }));
                } catch {}
            }
        }

        function invalidateCache(date) {
            try { sessionStorage.removeItem(_cacheKey(date)); } catch {}
        }

        // ── Rango de fechas inteligente ─────────────────────────────
        // Va hacia atrás hasta encontrar el viernes laboral anterior
        // desde la targetDate (no desde hoy), con mínimo de 3 días
        // y máximo de 8 días de calendario. Así cubre:
        //   lunes normal → viernes (3 días)
        //   martes después de feriado lunes → viernes (4 días)
        //   martes después de fin de semana largo → viernes (4-5 días)
        function calcularDateFrom(targetDate) {
            const base = new Date(targetDate);
            base.setHours(0,0,0,0);
            // Retroceder hasta el viernes anterior desde targetDate, mínimo 3 días calendario
            let d = new Date(base);
            let calDays = 0;
            while (true) {
                d.setDate(d.getDate() - 1);
                calDays++;
                if (calDays >= 3 && d.getDay() === 5) break; // encontramos viernes, mín 3 días
                if (calDays >= 8) break; // tope de seguridad
            }
            return d;
        }

        async function cargarNoEntregados() {
            const myGen = ++loadGeneration;
            const content = document.getElementById('content');

            document.getElementById('statsSection').classList.add('hidden');
            document.getElementById('sortSection').classList.add('hidden');
            document.getElementById('btnMapa').classList.add('hidden');

            const hoy = new Date(); hoy.setHours(0,0,0,0);
            // Rango de entrega: últimos 7 días (fecha estimada de entrega, no de creación)
            const pad = n => String(n).padStart(2,'0');
            const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
            const desde = new Date(hoy); desde.setDate(desde.getDate() - 7);
            const deliveryFrom = encodeURIComponent(`${fmt(desde)}T00:00:00.000-03:00`);
            const deliveryTo   = encodeURIComponent(`${fmt(hoy)}T23:59:59.000-03:00`);

            // Progreso compartido
            const prog = { done: 0, total: 0 };
            let rafPend = false;
            function notifyProg() {
                if (rafPend) return; rafPend = true;
                requestAnimationFrame(() => {
                    rafPend = false;
                    const fill = document.getElementById('neProgressFill');
                    const wrap = document.getElementById('neProgressWrap');
                    const txt  = document.getElementById('neProgressText');
                    if (!fill || !wrap || prog.total <= 0) return;
                    wrap.style.display = 'block';
                    fill.style.width = Math.min(100, Math.round(prog.done / prog.total * 100)) + '%';
                    if (txt) txt.textContent = `${prog.done} de ${prog.total} revisados`;
                });
            }

            content.innerHTML = `<div class="loading"><div class="loading-spinner"></div><br>🚫 Buscando viajes sin entregar (7 días)...
                <div class="load-progress-wrap" id="neProgressWrap" style="display:none;">
                    <div class="load-progress-track"><div class="load-progress-fill" id="neProgressFill"></div></div>
                    <div class="load-progress-text" id="neProgressText"></div>
                </div></div>`;

            const shippingIdsVistos = new Set();
            const CONC = 35;

            // Pre-fetch tokens en paralelo para ambas cuentas
            const tokens = await Promise.all(CUENTAS.map(c => obtenerTokenCuenta(c)));

            const cuentaResults = await Promise.all(CUENTAS.map(async (cuenta, ci) => {
                try {
                    const token = tokens[ci];
                    if (!token) return [];
                    const cuentaKey = cuenta.nombre.toLowerCase();
                    let sellerId = sessionStorage.getItem(`${cuentaKey}_user_id`);
                    if (!sellerId) {
                        const td = await fetch(`${cuenta.proxy}/get-token`).then(r=>r.json()).catch(()=>({}));
                        if (td.user_id) { sellerId = td.user_id; sessionStorage.setItem(`${cuentaKey}_user_id`, sellerId); }
                    }
                    if (!sellerId) return [];

                    // Query A: delivery date range (ML filtra server-side → mucho menos volumen)
                    // Query B: date_created últimos 10 días para capturar not_delivered que ya fallaron
                    //          (su estimated_delivery ya pasó hace más de 7 días en algún caso)
                    const filterA = `&shipping.estimated_delivery_time.from=${deliveryFrom}&shipping.estimated_delivery_time.to=${deliveryTo}&order.status=paid`;
                    const desde10 = new Date(hoy); desde10.setDate(desde10.getDate()-10);
                    const filterB = `&order.date_created.from=${encodeURIComponent(desde10.toISOString().split('.')[0]+'.000-00:00')}&order.date_created.to=${encodeURIComponent(new Date(hoy.getTime()+86400000).toISOString().split('.')[0]+'.000-00:00')}&order.status=paid`;

                    async function fetchPaged(filter) {
                        let orders = [];
                        const fd = await fetch(`${cuenta.proxy}/api/orders/search?seller=${sellerId}&offset=0&limit=50&sort=date_desc${filter}`,
                            { headers: { 'Authorization': `Bearer ${token}` } }).then(r=>r.json()).catch(()=>({results:[],paging:{}}));
                        orders.push(...(fd.results||[]));
                        const total = fd.paging?.total || 0;
                        if (total > 50) {
                            const pages = Math.min(Math.ceil(total/50)-1, 9);
                            const extra = await Promise.all(Array.from({length:pages},(_,i)=>
                                fetch(`${cuenta.proxy}/api/orders/search?seller=${sellerId}&offset=${(i+1)*50}&limit=50&sort=date_desc${filter}`,
                                    {headers:{'Authorization':`Bearer ${token}`}}).then(r=>r.json()).catch(()=>({results:[]}))
                            ));
                            extra.forEach(d=>orders.push(...(d.results||[])));
                        }
                        return orders;
                    }

                    // Ambas queries en paralelo
                    const [ordersA, ordersB] = await Promise.all([fetchPaged(filterA), fetchPaged(filterB)]);

                    // Deduplicar A+B
                    const seen = new Set();
                    const combined = [];
                    [...ordersA, ...ordersB].forEach(o => {
                        const sid = o.shipping?.id;
                        if (!sid || seen.has(sid) || o.status === 'cancelled') return;
                        seen.add(sid);
                        combined.push(o);
                    });

                    console.log(`[${cuenta.nombre}] NE — A:${ordersA.length} B:${ordersB.length} → ${combined.length} únicos`);

                    prog.total += combined.length; notifyProg();

                    const results = new Array(combined.length).fill(null);
                    let idx = 0;
                    async function worker() {
                        while (idx < combined.length) {
                            const i = idx++;
                            const order = combined[i];
                            try {
                                const r = await fetch(`${cuenta.proxy}/api/shipments/${order.shipping.id}`,
                                    { headers: { 'Authorization': `Bearer ${token}` } });
                                if (r.ok) {
                                    const shipping = await r.json();
                                    if (shipping.logistic_type === 'self_service'
                                        && shipping.status_history?.date_shipped
                                        && !shipping.status_history?.date_delivered
                                        && (shipping.status === 'shipped' || shipping.status === 'not_delivered')
                                    ) {
                                        results[i] = { order, shipping, cuentaNombre: cuenta.nombre, cuentaColor: cuenta.color };
                                    }
                                }
                            } catch {}
                            prog.done++; notifyProg();
                        }
                    }
                    await Promise.all(Array.from({ length: CONC }, worker));
                    return results.filter(Boolean);
                } catch (e) {
                    console.error(`cargarNoEntregados ${cuenta.nombre}:`, e);
                    return [];
                }
            }));

            if (loadGeneration !== myGen) return;

            const todos = [];
            cuentaResults.flat().forEach(item => {
                const sid = item.shipping.id;
                if (shippingIdsVistos.has(sid)) return;
                shippingIdsVistos.add(sid);
                todos.push(item);
            });

            // Ordenar: shipped (aún en camino) primero por fecha desc, not_delivered al final por fecha asc
            todos.sort((a, b) => {
                const fa = a.shipping.shipping_option?.estimated_delivery_time?.date || a.shipping.shipping_option?.estimated_delivery_final?.date || '';
                const fb = b.shipping.shipping_option?.estimated_delivery_time?.date || b.shipping.shipping_option?.estimated_delivery_final?.date || '';
                // shipped sin entregar = más urgente, ponerlos primero
                const pa = a.shipping.status === 'shipped' ? 0 : 1;
                const pb = b.shipping.status === 'shipped' ? 0 : 1;
                if (pa !== pb) return pa - pb;
                return fa.localeCompare(fb);
            });

            document.getElementById('badgeFecha').textContent = `🚫 SIN ENTREGAR (7 días)`;
            document.getElementById('badgeCaba').textContent = `📦 ${todos.length} envío${todos.length !== 1 ? 's' : ''}`;
            document.getElementById('badgeProvincia').textContent = '';
            document.getElementById('infoBadges').style.display = 'flex';

            if (todos.length === 0) {
                content.innerHTML = `<div class="no-results" style="padding:40px; text-align:center;">
                    <div style="font-size:40px; margin-bottom:12px;">✅</div>
                    Todos los viajes de los últimos 7 días se entregaron correctamente
                    <br><br>
                    <button onclick="cargarFlexHoy()">🔙 Volver a HOY</button>
                </div>`;
                return;
            }

            const grupoLabels = {
                'receiver_absent':            { label: '🚫 Comprador ausente',          color: '#f85149' },
                'rescheduled_by_buyer':        { label: '📅 Reprog. por comprador',      color: '#FF9800' },
                'buyer_rescheduled':           { label: '📅 Reprog. por comprador',      color: '#FF9800' },
                'rescheduled':                 { label: '🔄 Reprogramado',               color: '#FF9800' },
                'delayed':                     { label: '⏰ Demorado',                    color: '#FF9800' },
                'returning_to_sender':         { label: '↩️ Devolviendo al vendedor',     color: '#f85149' },
                'not_delivered_and_returning': { label: '↩️ En devolución',               color: '#f85149' },
                'out_of_delivery_area':        { label: '📍 Fuera de zona',               color: '#f85149' },
                'delivery_failed':             { label: '❌ Entrega fallida',              color: '#f85149' },
                'waiting_for_withdrawal':      { label: '📦 Esperando retiro',             color: '#FF9800' },
                'out_for_delivery':            { label: '🚚 En camino (sin confirmar)',    color: '#00d9ff' },
                'in_transit':                  { label: '🚚 En camino',                   color: '#00d9ff' },
            };

            const diasN = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];

        // ── Progress de carga ─────────────────────────────────────────
        let _progRafPending = false;
        function updateLoadingProgressDOM(done, total) {
            const fill = document.getElementById('loadProgressFill');
            const text = document.getElementById('loadProgressText');
            const wrap = document.getElementById('loadProgressWrap');
            if (!fill || !text || !wrap) return;
            if (total <= 0) return;
            wrap.style.display = 'block';
            const pct = Math.min(100, Math.round((done / total) * 100));
            fill.style.width = pct + '%';
            text.textContent = `${done} de ${total} envíos`;
        }

        async function cargarFlexPorFecha(targetDate, label, silentRetry = false, loadGen = null, backgroundRefresh = false) {
            const content = document.getElementById('content');
            if (!backgroundRefresh) {
                content.innerHTML = `<div class="loading"><div class="loading-spinner"></div><br>Cargando entregas de ${label}...<div class="load-progress-wrap" id="loadProgressWrap" style="display:none;"><div class="load-progress-track"><div class="load-progress-fill" id="loadProgressFill"></div></div><div class="load-progress-text" id="loadProgressText"></div></div></div>`;
            }
            
            let allOrdersFromAllAccounts = [];
            const shippingIdsVistos = new Set();

            // Objeto de progreso compartido por ambas cuentas
            // En background refresh NO tocamos el DOM (hay contenido cacheado visible)
            const progress = { done: 0, total: 0 };
            const notifyProgress = backgroundRefresh ? () => {} : () => {
                if (_progRafPending) return;
                _progRafPending = true;
                requestAnimationFrame(() => {
                    _progRafPending = false;
                    updateLoadingProgressDOM(progress.done, progress.total);
                });
            };

            // Pre-fetch tokens de ambas cuentas en paralelo antes de las queries
            const tokensPreFetch = await Promise.all(CUENTAS.map(c => obtenerTokenCuenta(c)));

            // Cargar AMBAS cuentas en PARALELO (2x más rápido)
            const cuentaResults = await Promise.all(CUENTAS.map(async (cuenta, ci) => {
                try {
                    const token = tokensPreFetch[ci];
                    if (!token) {
                        console.error(`No hay token para ${cuenta.nombre}`);
                        return [];
                    }
                    const orders = await cargarOrdenesDeCuenta(cuenta, token, targetDate, loadGen, progress, notifyProgress);
                    return orders.map(item => ({
                        ...item,
                        cuentaNombre: cuenta.nombre,
                        cuentaColor: cuenta.color
                    }));
                } catch (error) {
                    console.error(`Error cargando cuenta ${cuenta.nombre}:`, error);
                    return [];
                }
            }));

            // Guard: si arrancó otra carga, no renderizar
            if (loadGen !== null && loadGeneration !== loadGen) return;

            cuentaResults.flat().forEach(item => {
                const shippingId = item.shipping.id;
                if (!shippingIdsVistos.has(shippingId)) {
                    shippingIdsVistos.add(shippingId);
                    allOrdersFromAllAccounts.push(item);
                }
            });

            if (allOrdersFromAllAccounts.length === 0) {
                // En modo retry silencioso, simplemente retornar sin mostrar error
                if (silentRetry) return;
                
                content.innerHTML = `
                    <div class="error">
                        ⚠️ No hay envíos FLEX para ${label}<br><br>
                        Si este es el primer uso, ejecutá el setup primero para configurar las cuentas.
                        <br><br>
                        <button onclick="window.location.href='setup-flex-seguro.html'" style="margin-top:15px;">
                            ⚙️ Ir a Configuración
                        </button>
                    </div>
                `;
                return;
            }

            // FILTRAR CANCELADAS: Solo mostrar canceladas si son para HOY (targetDate)
            const processed = allOrdersFromAllAccounts.filter(({ shipping }) => {
                const state = shipping._state || getOrderState(shipping);
                if (state === 'cancelado') {
                    return esEntregaParaFecha(shipping, targetDate);
                }
                return true;
            });

            // Si es background refresh, devolver los datos sin tocar la UI
            if (backgroundRefresh) {
                saveToCache(targetDate, processed);
                return processed;
            }

            allFlexOrders = processed;

            // Guardar en cache
            saveToCache(targetDate, allFlexOrders);

            // En modo retry silencioso, no renderizar si no hay órdenes activas
            if (silentRetry) {
                const activas = allFlexOrders.filter(({shipping}) => shipping._state !== 'cancelado');
                if (activas.length === 0) return;
            }

            renderCargaCompletada(label, targetDate);
        }

        async function cargarOrdenesDeCuenta(cuenta, token, targetDate, loadGen = null, progress = null, notify = null) {
            let tempOrders = [];

            const cuentaKey = cuenta.nombre.toLowerCase();
            let sellerId = sessionStorage.getItem(`${cuentaKey}_user_id`);

            // Si no tenemos sellerId todavía, intentar extraerlo del token response
            // (ya fue fetcheado en obtenerTokenCuenta — evitamos un round-trip extra)
            if (!sellerId) {
                try {
                    const tokenResponse = await fetch(`${cuenta.proxy}/get-token`);
                    const tokenData = await tokenResponse.json();
                    if (tokenData.user_id) {
                        sellerId = tokenData.user_id;
                        sessionStorage.setItem(`${cuentaKey}_user_id`, sellerId);
                    }
                } catch (error) {
                    console.error(`Error obteniendo user_id para ${cuenta.nombre}:`, error);
                }
            }

            if (!sellerId) {
                console.error(`No se encontró user_id para ${cuenta.nombre}`);
                return [];
            }

            // ── Helper de paginación ──────────────────────────────────────
            async function fetchAllPages(filter) {
                let orders = [];
                try {
                    const first = await fetch(
                        `${cuenta.proxy}/api/orders/search?seller=${sellerId}&offset=0&limit=50&sort=date_desc${filter}`,
                        { headers: { 'Authorization': `Bearer ${token}` } }
                    );
                    const firstData = await first.json();
                    orders.push(...(firstData.results || []));
                    const total = firstData.paging?.total || 0;
                    if (total > 50) {
                        const pages = Math.min(Math.ceil(total / 50) - 1, 9);
                        const extra = await Promise.all(
                            Array.from({ length: pages }, (_, i) =>
                                fetch(`${cuenta.proxy}/api/orders/search?seller=${sellerId}&offset=${(i+1)*50}&limit=50&sort=date_desc${filter}`,
                                    { headers: { 'Authorization': `Bearer ${token}` } })
                                .then(r => r.json()).catch(() => ({ results: [] }))
                            )
                        );
                        extra.forEach(d => orders.push(...(d.results || [])));
                    }
                } catch (e) {
                    console.error(`fetchAllPages error [${cuenta.nombre}]:`, e);
                }
                return orders;
            }

            // ── ESTRATEGIA SEGÚN ANTIGÜEDAD DE LA FECHA ────────────────────
            //
            // Fechas recientes (≤3 días): estrategia dual con filtro por delivery date
            //   → Query A: shipping.estimated_delivery_time = targetDate (ML server-side)
            //   → Query B: not_delivered recientes
            //
            // Fechas antiguas (>3 días): siempre date_created range
            //   → El filtro estimated_delivery_time no es confiable para el pasado
            //   → ML puede devolver resultados de fechas distintas
            // ────────────────────────────────────────────────────────────────

            const hoyCheck = new Date(); hoyCheck.setHours(0,0,0,0);
            const diasAtras = Math.round((hoyCheck - targetDate) / 86400000);
            const esFechaAntigua = diasAtras > 3;

            let allOrders;

            if (esFechaAntigua) {
                // Para fechas históricas: query simple por date_created con rango desde viernes anterior
                const dateFrom = calcularDateFrom(targetDate);
                const dateTo = new Date(targetDate); dateTo.setDate(dateTo.getDate()+1); dateTo.setHours(23,59,59,0);
                const historFilter = `&order.date_created.from=${encodeURIComponent(dateFrom.toISOString().split('.')[0]+'.000-00:00')}&order.date_created.to=${encodeURIComponent(dateTo.toISOString().split('.')[0]+'.000-00:00')}&order.status=paid`;
                console.log(`[${cuenta.nombre}] Fecha antigua (${diasAtras}d atrás), usando date_created range`);
                allOrders = await fetchAllPages(historFilter);
            } else {
                // Timezone Buenos Aires para el filtro de fecha
                const pad = n => String(n).padStart(2,'0');
                const td = targetDate;
                const targetDateStr = `${td.getFullYear()}-${pad(td.getMonth()+1)}-${pad(td.getDate())}`;
                const deliveryFrom = encodeURIComponent(`${targetDateStr}T00:00:00.000-03:00`);
                const deliveryTo   = encodeURIComponent(`${targetDateStr}T23:59:59.000-03:00`);
                const reprogFrom   = calcularDateFrom(targetDate);
                const reprogFromStr = reprogFrom.toISOString().split('.')[0] + '.000-00:00';

                const filterA = `&shipping.estimated_delivery_time.from=${deliveryFrom}&shipping.estimated_delivery_time.to=${deliveryTo}&order.status=paid`;
                const filterB = `&order.date_created.from=${encodeURIComponent(reprogFromStr)}&order.status=paid`;

                const [ordersA, ordersB] = await Promise.all([
                    fetchAllPages(filterA),
                    fetchAllPages(filterB),
                ]);

                if (ordersA.length === 0 && ordersB.length === 0) {
                    // Fallback por date_created si ambas vacías
                    console.warn(`[${cuenta.nombre}] Dual query sin resultados, fallback date_created`);
                    const dateFrom = calcularDateFrom(targetDate);
                    const dateTo = new Date(targetDate); dateTo.setDate(dateTo.getDate()+1); dateTo.setHours(23,59,59,0);
                    const fbFilter = `&order.date_created.from=${encodeURIComponent(dateFrom.toISOString().split('.')[0]+'.000-00:00')}&order.date_created.to=${encodeURIComponent(dateTo.toISOString().split('.')[0]+'.000-00:00')}&order.status=paid`;
                    allOrders = await fetchAllPages(fbFilter);
                } else {
                    const seen = new Set();
                    allOrders = [];
                    [...ordersA, ...ordersB].forEach(o => {
                        const sid = o.shipping?.id;
                        if (!sid || seen.has(sid)) return;
                        seen.add(sid);
                        allOrders.push(o);
                    });
                }
                console.log(`[${cuenta.nombre}] Query A: ${ordersA?.length??0} | Query B: ${ordersB?.length??0} | Total: ${allOrders.length}`);
            }

            if (loadGen !== null && loadGeneration !== loadGen) return [];

            // Filtro client-side: saltear sin shipping o canceladas a nivel orden
            const ordersConShipping = allOrders.filter(o =>
                o.shipping?.id &&
                o.status !== 'cancelled' &&
                o.order_status !== 'cancelled'
            );

            if (progress) { progress.total += ordersConShipping.length; if (notify) notify(); }

            // PASO 3: Consultar shipping en paralelo con concurrencia limitada (evita saturar el proxy)
            // Máximo 20 requests simultáneos en lugar de todos a la vez
            async function fetchShipping(shippingId) {
                const url = `${cuenta.proxy}/api/shipments/${shippingId}`;
                const opts = { headers: { 'Authorization': `Bearer ${token}` } };
                try {
                    const r = await fetch(url, opts);
                    if (r.ok) return r.json();
                    await new Promise(res => setTimeout(res, 200));
                    const r2 = await fetch(url, opts);
                    return r2.ok ? r2.json() : null;
                } catch {
                    try {
                        await new Promise(res => setTimeout(res, 200));
                        const r2 = await fetch(url, opts);
                        return r2.ok ? r2.json() : null;
                    } catch { return null; }
                }
            }

            // Pool de concurrencia limitada: procesa de a CONCURRENCY a la vez
            // IMPORTANTE: siempre verificar esEntregaParaFecha en el shipment real,
            // porque los filtros de ML no son 100% exactos y Query B trae de cualquier fecha.
            const CONCURRENCY = 35;
            async function pooledFetch(orders) {
                const results = new Array(orders.length).fill(null);
                let idx = 0;
                async function worker() {
                    while (idx < orders.length) {
                        const i = idx++;
                        const order = orders[i];
                        const shippingId = order.shipping?.id;
                        const shipping = await fetchShipping(shippingId);
                        if (progress) { progress.done++; if (notify) notify(); }
                        if (!shipping) continue;
                        if (shipping.logistic_type !== 'self_service') continue;
                        // Filtro de fecha: incluir solo si es para targetDate,
                        // O si es not_delivered/cancelled (reprogramados que ya fallaron)
                        if (esEntregaParaFecha(shipping, targetDate) ||
                            shipping.status === 'not_delivered' ||
                            shipping.status === 'cancelled') {
                            results[i] = { order, shipping };
                        }
                    }
                }
                await Promise.all(Array.from({ length: CONCURRENCY }, worker));
                return results;
            }

            const results = await pooledFetch(ordersConShipping);
            tempOrders = results.filter(item => item !== null);

            if (loadGen !== null && loadGeneration !== loadGen) return [];

            // Enriquecer datos con tracking detallado (síncrono, datos ya en shipping)
            tempOrders.forEach(({ order, shipping }) => {
                enrichShippingData(null, null, shipping, order.id);
                // Cachear estado y zona: se calculan UNA sola vez aquí,
                // y se reusan en todos los filtros/sorts/renders posteriores.
                shipping._state = getOrderState(shipping);
                shipping._zona = getZonaDetallada(
                    shipping.receiver_address?.neighborhood?.name || '',
                    shipping.receiver_address?.city?.name || '',
                    shipping.receiver_address?.zip_code || ''
                );
            });

            const uniqueShippings = new Map();
            tempOrders.forEach(({ order, shipping }) => {
                const shippingId = shipping.id;
                if (!uniqueShippings.has(shippingId)) {
                    uniqueShippings.set(shippingId, { orders: [order], shipping });
                } else {
                    uniqueShippings.get(shippingId).orders.push(order);
                }
            });

            return Array.from(uniqueShippings.values());
        }

        function toggleSimpleDetails(index) {

        function getOrderState(shipping) {
            const status = (shipping.status || '').toLowerCase();
            const substatus = (shipping.substatus || '').toLowerCase();
            const history = shipping.status_history || {};
            const tags = shipping.tags || [];
            const tagsLower = tags.map(t => (t || '').toLowerCase());
            
            // Primero: detectar reprogramados (incluye not_delivered con substatus específico)
            if (substatus === 'rescheduled' || substatus === 'rescheduled_by_buyer' ||
                substatus === 'buyer_rescheduled' ||
                substatus === 'delayed' || substatus === 'returning_to_sender' ||
                substatus === 'waiting_for_withdrawal' || substatus === 'receiver_absent' ||
                substatus === 'out_of_delivery_area' || substatus === 'not_delivered_and_returning' ||
                substatus === 'delivery_failed' ||
                tagsLower.includes('rescheduled') || tagsLower.includes('delayed') ||
                tagsLower.includes('return_to_sender')) {
                return 'reprogramado';
            }

            // not_delivered sin substatus de cancelación → reprogramado
            if (status === 'not_delivered' && !substatus.includes('cancel')) {
                return 'reprogramado';
            }
            
            // Cancelados
            if (status === 'cancelled' ||
                substatus === 'cancelled' || substatus === 'buyer_cancelled' || 
                substatus === 'cancelled_by_buyer' || substatus === 'cancelled_manually' ||
                tagsLower.includes('cancelled') ||
                (status === 'not_delivered' && substatus.includes('cancel'))) {
                return 'cancelado';
            }
            
            if (history.date_delivered) {
                return 'entregado';
            }
            
            if (history.date_shipped) {
                return 'en-camino';
            }
            
            return 'pendiente';
        }

        function getReprogramadoDetail(shipping) {
            const substatus = (shipping.substatus || '').toLowerCase();
            if (substatus === 'receiver_absent') return { label: '🚫 Comprador ausente', short: 'Comprador ausente' };
            if (substatus === 'buyer_rescheduled' || substatus === 'rescheduled_by_buyer' || substatus === 'rescheduled') return { label: '📅 Reprogramado por comprador', short: 'Reprogram. comprador' };
            if (substatus === 'delayed') return { label: '⏰ Demorado', short: 'Demorado' };
            if (substatus === 'returning_to_sender' || substatus === 'not_delivered_and_returning') return { label: '↩️ Devolviendo al vendedor', short: 'Devolviendo' };
            if (substatus === 'out_of_delivery_area') return { label: '📍 Fuera de zona', short: 'Fuera de zona' };
            if (substatus === 'delivery_failed') return { label: '❌ Entrega fallida', short: 'Entrega fallida' };
            if (substatus === 'waiting_for_withdrawal') return { label: '📦 Esperando retiro', short: 'Esperando retiro' };
            return { label: '🔄 Reprogramado', short: 'Reprogramado' };
        }

        // === TRACKING DETALLADO - Clasifica eventos del historial de ML ===
        function classifyTrackingEvent(event) {
            const label = (event.label || '').toLowerCase();
            const sub = (event.substatus || '').toLowerCase();
            
            if (sub === 'receiver_absent' || label.includes('ausente')) return { icon: 'absent', css: 'highlight-absent' };
            if (sub === 'nearby' || sub === 'almost_there' || label.includes('muy cerca')) return { icon: 'near', css: 'highlight-near' };
            if (sub === 'rescheduled' || label.includes('nuevamente') || label.includes('reintento')) return { icon: 'retry', css: '' };
            if (sub === 'delivered' || label.includes('entregamos')) return { icon: 'delivered', css: '' };
            if (sub === 'in_transit' || sub === 'out_for_delivery' || sub === 'shipped' || label.includes('en camino')) return { icon: 'shipped', css: '' };
            if (sub === 'returning_to_sender' || sub === 'not_delivered_and_returning' || label.includes('devolv')) return { icon: 'absent', css: 'highlight-absent' };
            if (sub === 'delivery_failed' || label.includes('fallid')) return { icon: 'absent', css: 'highlight-absent' };
            return { icon: 'default', css: '' };
        }

        function renderTrackingDetail(shipping) {
            const events = shipping._trackingEvents;
            if (!events || events.length === 0) return '';

            let html = '<div class="tracking-detail">';
            html += '<div style="font-size:11px; color:#888; margin-bottom:6px; font-weight:bold;">📋 HISTORIAL DE RASTREO</div>';
            
            events.forEach(ev => {
                const cls = classifyTrackingEvent(ev);
                html += `<div class="tracking-event ${cls.css}">
                    <div class="track-icon ${cls.icon}"></div>
                    <div class="track-msg">${ev.label}</div>
                </div>`;
            });
            
            html += '</div>';
            return html;
        }

        function renderReputationBadge(shipping) {
            const problems = shipping._problems;
            if (!problems || problems.length === 0) return '';
            
            return problems.map(p => {
                const labelType = p.typeLabel || p.type;
                const timeStr = p.time ? ` · ${p.time} hs` : '';
                if (p.reputationAffected) {
                    return `<span class="reputation-warning">⚠️ Reputación afectada · ${labelType}${timeStr}</span>`;
                } else {
                    return `<span class="reputation-ok">✓ Rep. no afectada · ${labelType}${timeStr}</span>`;
                }
            }).join(' ');
        }

        // Enriquecer datos de shipping con info extra del detalle de ML
        function enrichShippingData(cuenta, token, shipping, orderId) {
            // El substatus_history ya viene en el shipping object
            // Lo convertimos a tracking events legibles
            const subHistory = shipping.substatus_history || [];
            const history = shipping.status_history || {};
            let events = [];

            // Mapeo de substatus a textos legibles (como los muestra ML)
            const substatusLabels = {
                'shipment_paid': 'Preparando envío',
                'ready_to_ship': 'Listo para enviar',
                'picked_up': 'Retirado por el transportista',
                'in_hub': 'En centro de distribución',
                'in_transit': 'El paquete está en camino.',
                'out_for_delivery': 'El paquete está en camino.',
                'nearby': 'El paquete está muy cerca.',
                'almost_there': 'El paquete está muy cerca.',
                'receiver_absent': 'Comprador ausente.',
                'waiting_for_withdrawal': 'Esperando retiro en punto de entrega.',
                'delivered': 'Entregamos el paquete.',
                'returning_to_sender': 'Devolviendo al vendedor.',
                'not_delivered_and_returning': 'No se pudo entregar, en devolución.',
                'rescheduled': 'El paquete está en camino nuevamente.',
                'rescheduled_by_buyer': 'Reprogramado por el comprador.',
                'buyer_rescheduled': 'Reprogramado por el comprador.',
                'delayed': 'Envío demorado.',
                'out_of_delivery_area': 'Fuera de zona de entrega.',
                'delivery_failed': 'Entrega fallida.',
                'claimed_me': 'Reclamo abierto.',
                'stolen': 'Paquete robado.',
                'lost': 'Paquete extraviado.',
                'damaged': 'Paquete dañado.',
                'cancelled': 'Envío cancelado.',
                'buyer_cancelled': 'Cancelado por el comprador.',
                'cancelled_by_buyer': 'Cancelado por el comprador.',
            };

            // Construir eventos desde substatus_history
            if (subHistory.length > 0) {
                subHistory.forEach(entry => {
                    const dateStr = entry.date ? formatDateShort(entry.date) : '';
                    const label = substatusLabels[entry.substatus] || entry.substatus || entry.status || '';
                    if (label) {
                        events.push({ label: `${dateStr} | ${label}`, substatus: entry.substatus });
                    }
                });
            }

            // Agregar eventos del status_history que no estén ya cubiertos
            if (history.date_shipped && !events.some(e => e.substatus === 'in_transit' || e.substatus === 'out_for_delivery')) {
                events.push({ label: `${formatDateShort(history.date_shipped)} | El paquete está en camino.`, substatus: 'shipped' });
            }
            if (history.date_delivered && !events.some(e => e.substatus === 'delivered')) {
                events.push({ label: `${formatDateShort(history.date_delivered)} | Entregamos el paquete.`, substatus: 'delivered' });
            }
            if (history.date_not_delivered) {
                events.push({ label: `${formatDateShort(history.date_not_delivered)} | No se pudo entregar.`, substatus: 'not_delivered' });
            }

            // Eliminar duplicados y ordenar por fecha
            const seen = new Set();
            events = events.filter(e => {
                const key = e.label;
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });

            if (events.length > 0) {
                shipping._trackingEvents = events;
            }

            // Detectar problemas de reputación desde substatus_history
            const problemSubstatuses = ['delayed', 'delivery_failed', 'receiver_absent', 'lost', 'stolen', 'damaged'];
            const problems = [];

            const problemTranslations = {
                'receiver_absent': 'Comprador ausente',
                'delivery_failed': 'Entrega fallida',
                'delayed': 'Demorado',
                'lost': 'Paquete extraviado',
                'stolen': 'Paquete robado',
                'damaged': 'Paquete dañado',
                'not_delivered': 'No entregado',
                'returning_to_sender': 'Devolviendo al vendedor',
                'not_delivered_and_returning': 'En devolución',
                'out_of_delivery_area': 'Fuera de zona',
                'waiting_for_withdrawal': 'Esperando retiro',
                'rescheduled': 'Reprogramado',
                'rescheduled_by_buyer': 'Reprogramado por comprador',
                'buyer_rescheduled': 'Reprogramado por comprador',
                'delivery_attempted': 'Intento de entrega',
            };
            
            // Si el envío es not_delivered o tiene substatus problemático
            if (shipping.status === 'not_delivered' || problemSubstatuses.includes(shipping.substatus)) {
                const probSub = shipping.substatus || shipping.status;
                // Buscar hora del evento en el historial
                const probEntry = subHistory.find(e => e.substatus === probSub);
                const probTime = probEntry?.date ? formatearSoloHora(probEntry.date) : null;
                problems.push({
                    type: probSub,
                    typeLabel: problemTranslations[probSub] || probSub,
                    reputationAffected: false,
                    time: probTime
                });
            }
            
            if (problems.length > 0) {
                shipping._problems = problems;
            }
        }

        function ordenarPor(tipo, btn) {

        function aplicarFiltros() {
            let filtered = allFlexOrders;

            if (currentCuentaFilter !== 'all') {
                filtered = filtered.filter(({ cuentaNombre }) => cuentaNombre === currentCuentaFilter);
            }

            // Usar _state cacheado en lugar de recalcular
            if (currentStateFilter === 'cancelado') {
                filtered = filtered.filter(({ shipping }) => shipping._state === 'cancelado');
            } else if (currentStateFilter === 'all') {
                filtered = filtered.filter(({ shipping }) => shipping._state !== 'cancelado');
            } else {
                filtered = filtered.filter(({ shipping }) => shipping._state === currentStateFilter);
            }

            // Usar _zona cacheada
            if (currentZoneFilter !== 'all') {
                filtered = filtered.filter(({ shipping }) => {
                    if (currentZoneFilter === 'CABA') return esCABA(shipping._zona);
                    return shipping._zona === currentZoneFilter;
                });
            }

            // Sorts con Schwartzian transform: extraer la clave UNA vez por elemento,
            // no dentro del comparador (que se ejecuta O(n log n) veces).
            if (currentSort === 'zona') {
                filtered = filtered
                    .map(item => ({ item, key: item.shipping._zona }))
                    .sort((a, b) => a.key.localeCompare(b.key))
                    .map(({ item }) => item);
            } else if (currentSort === 'fecha-entrega') {
                filtered = filtered
                    .map(item => ({ item, key: item.shipping.shipping_option?.estimated_delivery_time?.date || item.shipping.shipping_option?.estimated_delivery_final?.date || '' }))
                    .sort((a, b) => a.key.localeCompare(b.key))
                    .map(({ item }) => item);
            } else if (currentSort === 'hora-entrega') {
                filtered = filtered
                    .map(item => {
                        const h = item.shipping.status_history?.date_delivered || item.shipping.status_history?.date_shipped || item.shipping.date_created || '';
                        return { item, key: h ? new Date(h).getTime() : 0 };
                    })
                    .sort((a, b) => b.key - a.key)
                    .map(({ item }) => item);
            } else if (currentSort === 'estado') {
                const ord = { 'cancelado': 0, 'reprogramado': 1, 'pendiente': 2, 'en-camino': 3, 'entregado': 4 };
                filtered = filtered
                    .map(item => ({ item, key: ord[item.shipping._state] ?? 99 }))
                    .sort((a, b) => a.key - b.key)
                    .map(({ item }) => item);
            } else if (currentSort === 'recientes') {
                filtered = filtered
                    .map(item => ({ item, key: item.shipping.date_created || '' }))
                    .sort((a, b) => b.key.localeCompare(a.key))
                    .map(({ item }) => item);
            }

            displayOrders(currentStateFilter, filtered);
        }

        function displayOrders(filterType, customFiltered = null) {
            const orders = customFiltered || allFlexOrders;

            let ordersForStats = allFlexOrders;
            if (currentCuentaFilter !== 'all') {
                ordersForStats = ordersForStats.filter(({ cuentaNombre }) => cuentaNombre === currentCuentaFilter);
            }

            // Stats en una sola pasada con reduce (antes eran 5 filter separados)
            const stats = ordersForStats.reduce((acc, { shipping, cuentaNombre }) => {
                const s = shipping._state;
                if (s === 'pendiente')    acc.pendiente++;
                else if (s === 'en-camino')    acc.enCamino++;
                else if (s === 'entregado')    acc.entregado++;
                else if (s === 'cancelado')    acc.cancelado++;
                else if (s === 'reprogramado') acc.reprogramado++;
                return acc;
            }, { pendiente: 0, enCamino: 0, entregado: 0, cancelado: 0, reprogramado: 0 });
            stats.total = stats.pendiente + stats.enCamino + stats.entregado + stats.reprogramado;

            // Contadores por cuenta en una pasada
            const cuentaStats = allFlexOrders.reduce((acc, { cuentaNombre, shipping }) => {
                if (shipping._state === 'cancelado') return acc;
                acc.total++;
                if (cuentaNombre === 'Mikra') acc.mikra++;
                else if (cuentaNombre === 'Chaya') acc.chaya++;
                return acc;
            }, { total: 0, mikra: 0, chaya: 0 });

            document.getElementById('allCount').textContent = cuentaStats.total;
            document.getElementById('mikraCount').textContent = cuentaStats.mikra;
            document.getElementById('chayaCount').textContent = cuentaStats.chaya;

            document.querySelector('#stat-all .stat-number').textContent = stats.total;

            if (diaSemana === 6) {

            else if (diaSemana === 0) {

            hoy.setHours(0, 0, 0, 0);
            return hoy;
