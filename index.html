        // Fecha actualmente cargada (Date, medianoche)
        let currentNavDate = null;

        function buildDateNav() {
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            const esFinDeSemana = hoy.getDay() === 0 || hoy.getDay() === 6;
            const dias = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
            const container = document.getElementById('dateNavDays');
            if (!container) return;
            container.innerHTML = '';

            // Slots: hasta 3 días hábiles pasados + HOY (si es hábil) + mañana hábil
            const slots = [];

            // Días hábiles pasados (hasta 3, salteando finde)
            let d = new Date(hoy);
            let back = 0;
            while (back < 3) {
                d = new Date(d); d.setDate(d.getDate() - 1);
                if (d.getDay() !== 0 && d.getDay() !== 6) {
                    slots.unshift(new Date(d));
                    back++;
                }
            }

            // HOY: solo agregar si es día hábil
            if (!esFinDeSemana) {
                slots.push(new Date(hoy));
            }

            // Mañana hábil (1 solo)
            let manana = new Date(hoy);
            do { manana.setDate(manana.getDate() + 1); } while (manana.getDay() === 0 || manana.getDay() === 6);
            slots.push(manana);

            slots.forEach(fecha => {
                const btn = document.createElement('button');
                btn.className = 'date-nav-day';
                const isHoy = !esFinDeSemana && fecha.toDateString() === hoy.toDateString();
                const isActive = currentNavDate && fecha.toDateString() === currentNavDate.toDateString();
                if (isActive) btn.classList.add('active');

                const nombre = isHoy ? 'HOY' : dias[fecha.getDay()];
                const numDia = `${fecha.getDate()}/${fecha.getMonth()+1}`;
                btn.innerHTML = `<span class="day-name">${nombre}</span><span class="day-date">${numDia}</span>`;
                btn.onclick = () => cargarDia(fecha);
                container.appendChild(btn);
            });
        }

        async function cargarDia(fecha) {
            currentNavDate = new Date(fecha); currentNavDate.setHours(0,0,0,0);
            buildDateNav();
            const myGen = ++loadGeneration;
            currentStateFilter = 'all'; currentZoneFilter = 'all';
            currentCuentaFilter = 'all'; mostrarCanceladas = false;

            const hoy = new Date(); hoy.setHours(0,0,0,0);
            const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
            const esHoy = fecha.toDateString() === hoy.toDateString();
            const label = esHoy ? 'HOY' : `${dias[fecha.getDay()]} ${fecha.getDate()}/${fecha.getMonth()+1}`;

            // ── Cache hit: mostrar al instante y refrescar en background ──
            const cached = loadFromCache(currentNavDate);
            if (cached && cached.length > 0) {
                allFlexOrders = cached;
                renderCargaCompletada(label, fecha);
                // Badge de actualización en background
                const badge = document.createElement('div');
                badge.id = 'bgRefreshBadge';
                badge.style.cssText = 'position:fixed;bottom:16px;right:16px;background:#21262d;color:#8b949e;border:1px solid #30363d;border-radius:20px;padding:6px 14px;font-size:11px;z-index:9999;';
                badge.textContent = '🔄 Actualizando en segundo plano...';
                document.body.appendChild(badge);

                cargarFlexPorFecha(fecha, label, false, myGen, true).then(freshOrders => {
                    const bg = document.getElementById('bgRefreshBadge');
                    if (bg) bg.remove();
                    if (!freshOrders || loadGeneration !== myGen) return;
                    // Solo re-renderizar si hubo cambios
                    const changed = JSON.stringify(freshOrders.map(o => o.shipping.id + o.shipping._state))
                                 !== JSON.stringify(allFlexOrders.map(o => o.shipping.id + o.shipping._state));
                    if (changed) {
                        allFlexOrders = freshOrders;
                        renderCargaCompletada(label, fecha);
                        const toastEl = document.createElement('div');
                        toastEl.style.cssText = 'position:fixed;bottom:16px;right:16px;background:#00897B;color:white;border-radius:20px;padding:6px 14px;font-size:11px;z-index:9999;';
                        toastEl.textContent = '✓ Datos actualizados';
                        document.body.appendChild(toastEl);
                        setTimeout(() => toastEl.remove(), 2500);
                    }
                }).catch(() => { const b = document.getElementById('bgRefreshBadge'); if (b) b.remove(); });
                return;
            }

            // Sin cache: carga normal
            allFlexOrders = [];
            await cargarFlexPorFecha(fecha, label, false, myGen);
        }

        // Extrae el render final de cargarFlexPorFecha para poder llamarlo desde cache
        function renderCargaCompletada(label, targetDate) {
            const zonaCounts = new Map();
            let cabaCount = 0, provinciaCount = 0;
            allFlexOrders.forEach(({ shipping }) => {
                if (shipping._state === 'cancelado') return;
                const zona = shipping._zona;
                zonaCounts.set(zona, (zonaCounts.get(zona) || 0) + 1);
                if (esCABA(zona)) cabaCount++; else provinciaCount++;
            });

            document.getElementById('badgeFecha').textContent = `📅 ${label}`;
            if (currentNavDate) buildDateNav();
            document.getElementById('badgeCaba').textContent = `🏙️ CABA: ${cabaCount}`;
            document.getElementById('badgeProvincia').textContent = `🗺️ Provincia: ${provinciaCount}`;
            document.getElementById('infoBadges').style.display = 'flex';

            const dropdownItems = document.getElementById('dropdownItems');
            const totalSinCanceladas = allFlexOrders.filter(({shipping}) => shipping._state !== 'cancelado').length;
            dropdownItems.innerHTML = `<div class="dropdown-item" onclick="selectZone('all')">Todas las zonas (${totalSinCanceladas})</div>`;
            let cabaTotal = 0;
            Array.from(zonaCounts.entries()).forEach(([zona, count]) => { if (esCABA(zona)) cabaTotal += count; });
            if (cabaTotal > 0) dropdownItems.innerHTML += `<div class="dropdown-item" onclick="selectZone('CABA')">🏙️ CABA - Todos (${cabaTotal})</div>`;
            Array.from(zonaCounts.entries()).sort().forEach(([zona, count]) => {
                dropdownItems.innerHTML += `<div class="dropdown-item" onclick="selectZone('${zona}')">${zona} (${count})</div>`;
            });

            document.getElementById('statsSection').classList.remove('hidden');
            document.getElementById('sortSection').classList.remove('hidden');
            document.getElementById('btnMapa').classList.remove('hidden');
            displayOrders('all');
        }

        function navDia(delta) {
            // Si no hay fecha cargada aún, ignorar
            if (!currentNavDate) return;
            const base = new Date(currentNavDate);
            let nueva = new Date(base);
            const step = delta > 0 ? 1 : -1;
            let pasos = Math.abs(delta);
            while (pasos > 0) {
                nueva.setDate(nueva.getDate() + step);
                // Saltar fines de semana
                if (nueva.getDay() !== 0 && nueva.getDay() !== 6) pasos--;
            }
            cargarDia(nueva);
        }

        // ═══════════════════════════════════════════════
        //  Timeline unificado (reemplaza timeline + historial)
        // ═══════════════════════════════════════════════
        function buildUnifiedTimeline(shipping, fechaEntrega) {
            const history = shipping.status_history || {};
            const subHistory = shipping.substatus_history || [];

            // Mapeo de substatus → { texto, dotClass, timeClass }
            const subMap = {
                'shipment_paid':         { t: 'Preparando envío',                  d: 'c-gray',   tc: 't-muted' },
                'ready_to_ship':         { t: 'Listo para enviar',                 d: 'c-gray',   tc: 't-muted' },
                'picked_up':             { t: 'Retirado por transportista',         d: 'c-blue',   tc: 't-blue' },
                'in_hub':                { t: 'En centro de distribución',          d: 'c-blue',   tc: 't-blue' },
                'in_transit':            { t: '🚚 En camino',                       d: 'c-blue',   tc: 't-blue' },
                'out_for_delivery':      { t: '🚚 En camino',                       d: 'c-blue',   tc: 't-blue' },
                'nearby':                { t: '📍 Muy cerca',                       d: 'c-yellow', tc: 't-yellow' },
                'almost_there':          { t: '📍 Muy cerca',                       d: 'c-yellow', tc: 't-yellow' },
                'receiver_absent':       { t: '🚫 Comprador ausente',               d: 'c-red',    tc: 't-red' },
                'waiting_for_withdrawal':{ t: '📦 Esperando retiro',                d: 'c-orange', tc: 't-orange' },
                'delivered':             { t: '✅ Entregado',                        d: 'c-green',  tc: 't-green' },
                'returning_to_sender':   { t: '↩️ Devolviendo al vendedor',          d: 'c-red',    tc: 't-red' },
                'not_delivered_and_returning':{ t: '↩️ En devolución',              d: 'c-red',    tc: 't-red' },
                'rescheduled':           { t: '🔄 En camino nuevamente',             d: 'c-orange', tc: 't-orange' },
                'rescheduled_by_buyer':  { t: '📅 Reprogramado por comprador',      d: 'c-orange', tc: 't-orange' },
                'buyer_rescheduled':     { t: '📅 Reprogramado por comprador',      d: 'c-orange', tc: 't-orange' },
                'delayed':               { t: '⏰ Demorado',                         d: 'c-orange', tc: 't-orange' },
                'out_of_delivery_area':  { t: '📍 Fuera de zona',                   d: 'c-red',    tc: 't-red' },
                'delivery_failed':       { t: '❌ Entrega fallida',                  d: 'c-red',    tc: 't-red' },
                'cancelled':             { t: 'Cancelado',                           d: 'c-red',    tc: 't-red' },
                'buyer_cancelled':       { t: 'Cancelado por comprador',             d: 'c-red',    tc: 't-red' },
            };

            // Ignorar substatuses "ruidosos" que no aportan info
            const SKIP = new Set(['shipment_paid', 'ready_to_ship']);

            // Construir lista de eventos con fecha+hora real
            let events = [];
            const seen = new Set();

            subHistory.forEach(entry => {
                const sub = entry.substatus || '';
                if (SKIP.has(sub)) return;
                const key = sub + '|' + (entry.date || '');
                if (seen.has(key)) return;
                seen.add(key);
                const meta = subMap[sub] || { t: sub, d: 'c-gray', tc: 't-muted' };
                events.push({ date: entry.date, label: meta.t, dot: meta.d, tc: meta.tc });
            });

            // Agregar milestones del status_history si no están cubiertos
            if (history.date_shipped && !events.some(e => e.label.includes('camino'))) {
                events.push({ date: history.date_shipped, label: '🚚 En camino', dot: 'c-blue', tc: 't-blue' });
            }
            if (history.date_delivered && !events.some(e => e.dot === 'c-green')) {
                events.push({ date: history.date_delivered, label: '✅ Entregado', dot: 'c-green', tc: 't-green' });
            }

            // Ordenar cronológico
            events.sort((a, b) => (a.date || '') < (b.date || '') ? -1 : 1);

            // Si no hay nada, al menos mostrar Recibido
            if (events.length === 0 && shipping.date_created) {
                events.push({ date: shipping.date_created, label: '📦 Recibida', dot: 'c-gray', tc: 't-muted' });
            }

            // Estado final pendiente si no entregado/cancelado
            const finalState = getOrderState(shipping);
            const needsPending = finalState === 'pendiente' || finalState === 'en-camino';

            let html = '';
            events.forEach(ev => {
                const hora = ev.date ? formatearSoloHora(ev.date, fechaEntrega) : null;
                html += `<div class="utl-item">
                    <div class="utl-dot ${ev.dot}"></div>
                    <span class="utl-time ${ev.tc}">${hora || ''}</span>
                    <span class="utl-label">${ev.label}</span>
                </div>`;
            });

            if (needsPending) {
                html += `<div class="utl-item">
                    <div class="utl-dot c-pending"></div>
                    <span class="utl-time t-muted"></span>
                    <span class="utl-label" style="color:#484f58;">Entrega pendiente</span>
                </div>`;
            }

            return html;
        }

        window.addEventListener('DOMContentLoaded', () => {
            // Sincronizar label del botón de vista
            // vistaSimple siempre activa
            // Construir barra de días (sin fecha activa todavía)
            buildDateNav();
            actualizarLabelDiaAnterior();
            // Cargar HOY y marcar la fecha
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            currentNavDate = hoy;
            buildDateNav();
            cargarFlexHoy();
        });
    </script>
